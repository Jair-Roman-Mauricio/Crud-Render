services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: survey-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: survey-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: FRONTEND_URL
        value: https://survey-app.onrender.com   # Update after frontend deploys
      - key: BCRYPT_ROUNDS
        value: 12

  # ── Frontend Static Site ─────────────────────────────────────
  - type: web
    name: survey-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://survey-api.onrender.com   # Update to your backend URL

# ── PostgreSQL Database ───────────────────────────────────────
databases:
  - name: survey-db
    databaseName: surveydb
    user: surveyuser
    plan: free
